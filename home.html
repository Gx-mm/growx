<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GrowX Premium Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background: radial-gradient(circle at top,#0b1d3a,#020814);
color:white;
padding:20px;
overflow-x:hidden;
}

/* particles */

.particle{
position:fixed;
width:3px;
height:3px;
background:white;
border-radius:50%;
opacity:0.4;
animation:float 8s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* header */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.logo{
font-size:26px;
font-weight:600;
}

/* card */

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border-radius:18px;
padding:25px;
border:1px solid rgba(255,255,255,0.08);

box-shadow:
0 0 10px rgba(0,150,255,0.3),
0 0 20px rgba(0,150,255,0.3);

transition:0.4s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:
0 0 20px rgba(0,150,255,0.7),
0 0 40px rgba(0,150,255,0.5);
}

/* layout */

.top{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:25px;
}

.balance{
font-size:36px;
margin-top:10px;
font-weight:600;
}

/* buttons */

.actions{
display:flex;
gap:15px;
flex-wrap:wrap;
align-items:center;
}

.btn{

display:flex;
align-items:center;
gap:8px;

padding:12px 22px;

border-radius:40px;

border:1px solid rgba(255,255,255,0.2);

background:rgba(255,255,255,0.05);

backdrop-filter:blur(10px);

color:white;

cursor:pointer;

box-shadow:
0 0 10px rgba(255,180,0,0.6),
0 0 20px rgba(255,180,0,0.4);

transition:0.3s;

}

.btn:hover{

transform:scale(1.05);

box-shadow:
0 0 20px rgba(255,180,0,1),
0 0 40px rgba(255,180,0,0.8);

}

/* stats */

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:30px;
}

.stat h2{
font-size:32px;
}

/* services */

.title{
font-size:22px;
margin-bottom:20px;
}

.services{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.service{
text-align:center;
}

.icon img{
width:40px;
margin-bottom:10px;
}

.buy{
margin-top:12px;
padding:10px 18px;
border:none;
border-radius:30px;
cursor:pointer;

background:linear-gradient(45deg,#ffcc33,#ff6600);

box-shadow:0 0 15px rgba(255,170,0,0.9);
}

.buy:hover{
box-shadow:0 0 30px rgba(255,170,0,1);
}

/* footer */

.footer{
text-align:center;
margin-top:40px;
opacity:0.6;
font-size:13px;
}

@media(max-width:700px){
.top{grid-template-columns:1fr;}
.stats{grid-template-columns:1fr;}
}

</style>
</head>

<body>

<div class="header">

<div class="logo">GrowX</div>

<div onclick="location.href='setting.html'" style="cursor:pointer;font-size:22px">⚙</div>

</div>

<div class="top">

<div class="card">

<h2 id="welcome">Welcome 👋</h2>

<p>
User ID: <span id="userid"></span>
<span style="color:#00ff9c;">✔ Verified</span>
</p>

<p style="opacity:0.7;margin-top:15px;">Available Balance</p>

<div class="balance" id="balance">₹0</div>

</div>

<div class="actions">

<button class="btn" onclick="location.href='addfund.html'">
💳 Wallet
</button>

<button class="btn" onclick="location.href='order.html'">
🛒 New Order
</button>

<button class="btn" onclick="location.href='history.html'">
🕘 History
</button>

</div>

</div>

<div class="stats">

<div class="card stat">
<h2>9999+</h2>
<p>Total Orders</p>
</div>

<div class="card stat">
<h2>9999+</h2>
<p>Completed Orders</p>
</div>

</div>

<div class="title">Our Services</div>

<div class="services">

<div class="card service">

<div class="icon">
<img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png">
</div>

<h3>Instagram</h3>
<p>100K Views - ₹15</p>

<button class="buy" onclick="location.href='order.html'">Buy Now</button>

</div>

<div class="card service">

<div class="icon">
<img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png">
</div>

<h3>Instagram</h3>
<p>10K Followers - ₹100</p>

<button class="buy" onclick="location.href='order.html'">Buy Now</button>

</div>

<div class="card service">

<div class="icon">
<img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png">
</div>

<h3>Instagram</h3>
<p>100K Likes - ₹200</p>

<button class="buy" onclick="location.href='order.html'">Buy Now</button>

</div>

<div class="card service">

<div class="icon">
<img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png">
</div>

<h3>Instagram</h3>
<p>50K Story Views - ₹200</p>

<button class="buy" onclick="location.href='order.html'">Buy Now</button>

</div>

</div>

<div class="footer">
© 2026 GrowX • All Rights Reserved
</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbwyVwqw06pRsHaoiPkG_Hx8ZeVcRXyNF4ZAi4kqRjOQuxCVirJJSeIJk5AfnZJU3Ge_ow/exec";

/* login check */

if(!localStorage.getItem("userID")){
location.href="index.html";
}

/* load user */

async function loadUser(){

try{

const res = await fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"userData",
userID:localStorage.getItem("userID")
})
});

const data = await res.json();

/* username fix */

let username = data.USERNAME || data.username || "User";

document.getElementById("welcome").innerText =
"Welcome " + username + " 👋";

/* userid */

document.getElementById("userid").innerText = data.userID;

/* balance */

let bal = parseFloat(data.balance).toFixed(3);

document.getElementById("balance").innerText = "₹" + bal;

}catch(e){

console.log("API error",e);

}

}

loadUser();

/* particles */

for(let i=0;i<40;i++){

let p=document.createElement("div");

p.className="particle";

p.style.left=Math.random()*100+"vw";

p.style.animationDuration=(5+Math.random()*6)+"s";

document.body.appendChild(p);

}

</script>

</body>
</html>
