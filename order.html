<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GrowX • New Order</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}

body{

background:
radial-gradient(circle at 20% 20%,#1c2b4a,transparent 40%),
radial-gradient(circle at 80% 0%,#0b1b38,transparent 40%),
linear-gradient(180deg,#020617,#050b1a);

color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;

}

.card{

width:95%;
max-width:420px;

background:rgba(255,255,255,0.05);

backdrop-filter:blur(25px);

border-radius:30px;

padding:30px;

border:1px solid rgba(255,215,0,.4);

box-shadow:0 0 40px rgba(255,215,0,.2);

}

.title{
font-size:28px;
text-align:center;
margin-bottom:10px;
}

.balance{
text-align:center;
margin-bottom:20px;
font-size:14px;
opacity:.8;
}

label{font-size:14px;opacity:.8;}

select,input{

width:100%;
padding:14px;

margin-top:8px;
margin-bottom:18px;

border-radius:20px;

border:1px solid rgba(255,255,255,.1);

background:rgba(0,0,0,.4);

color:white;

}

.qtyBox{
display:flex;
align-items:center;
gap:10px;
}

.qtyBtn{
width:40px;
height:40px;
border-radius:12px;
border:none;
background:rgba(255,255,255,.1);
color:white;
font-size:20px;
cursor:pointer;
}

.qtyInput{
width:80px;
text-align:center;
}

.total{

background:rgba(255,215,0,.1);
padding:18px;
border-radius:20px;
text-align:center;
margin-top:10px;

}

.amount{

font-size:32px;
color:#FFD700;

}

.submit{

margin-top:25px;
width:100%;
padding:15px;
border:none;
border-radius:40px;
font-weight:700;
cursor:pointer;
background:linear-gradient(135deg,#FFD700,#FFB800);

}

.loader{

width:20px;
height:20px;
border:3px solid white;
border-top:3px solid transparent;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;

}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

.popup{

position:fixed;
top:50%;
left:50%;

transform:translate(-50%,-50%) scale(.8);

background:#111;

padding:30px 40px;

border-radius:20px;

text-align:center;

box-shadow:0 0 40px rgba(255,215,0,.7);

opacity:0;

transition:.3s;

}

.popup.show{
opacity:1;
transform:translate(-50%,-50%) scale(1);
}

.success{color:#00ff9c;font-size:26px;margin-bottom:10px;}
.error{color:#ff4d4d;font-size:26px;margin-bottom:10px;}

</style>
</head>

<body>

<div class="card">

<div class="title">New Order 🚀</div>

<div class="balance">
Balance: ₹<span id="balance">0</span>
</div>

<label>Category</label>
<select id="category"></select>

<label>Service</label>
<select id="service"></select>

<label>Instagram Link</label>
<input id="link" placeholder="Paste Instagram link">

<label>Quantity</label>

<div class="qtyBox">

<button class="qtyBtn" onclick="changeQty(-1000)">-</button>

<input id="qty" class="qtyInput" value="0">

<button class="qtyBtn" onclick="changeQty(1000)">+</button>

</div>

<div class="total">

Total amount

<div class="amount" id="amount">₹0</div>

</div>

<button id="submitBtn" class="submit" onclick="submitOrder()">
Submit Order
</button>

</div>

<div id="popup" class="popup"></div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbwyVwqw06pRsHaoiPkG_Hx8ZeVcRXyNF4ZAi4kqRjOQuxCVirJJSeIJk5AfnZJU3Ge_ow/exec";

/* login check */

if(!localStorage.getItem("userID")){
location.href="index.html";
}

/* show balance */

document.getElementById("balance").innerText=
localStorage.getItem("balance") || 0

/* popup */

function showPopup(type,msg){

const popup=document.getElementById("popup")

popup.innerHTML=`
<div class="${type}">${type=="success"?"✔":"⚠"}</div>
<p>${msg}</p>
`

popup.classList.add("show")

setTimeout(()=>{
popup.classList.remove("show")
},2000)

}

/* load services */

async function loadServices(){

const res=await fetch(API_URL,{
method:"POST",
body:JSON.stringify({action:"services"})
})

const data=await res.json()

const cat=document.getElementById("category")

const unique=[...new Set(data.map(x=>x.category))]

unique.forEach(c=>{
cat.innerHTML+=`<option>${c}</option>`
})

window.services=data

loadService()

}

/* service list */

function loadService(){

const cat=document.getElementById("category").value

const list=services.filter(x=>x.category==cat)

const s=document.getElementById("service")

s.innerHTML=""

list.forEach(x=>{
s.innerHTML+=`<option value="${x.price}">${x.service}</option>`
})

calc()

}

/* qty change */

function changeQty(n){

let q=document.getElementById("qty")

let v=parseInt(q.value)+n

if(v<1)v=1

q.value=v

calc()

}

/* price */

function calc(){

const price=document.getElementById("service").value
const qty=document.getElementById("qty").value

const total=(price/1000)*qty

document.getElementById("amount").innerText="₹"+total.toFixed(2)

}

/* qty manual input */

document.getElementById("qty").addEventListener("input",calc)

/* order */

async function submitOrder(){

const qty=parseInt(document.getElementById("qty").value)
const link=document.getElementById("link").value

const price=document.getElementById("service").value
const total=(price/1000)*qty

/* MINIMUM ₹100 CHECK */

if(total < 100){

showPopup("error","Minimum order amount is ₹100")

return

}

if(!link){

showPopup("error","Instagram link required")

return

}

const btn=document.getElementById("submitBtn")

btn.disabled=true
btn.innerHTML=`<div class="loader"></div>`

const service=document.getElementById("service").selectedOptions[0].text
const userID=localStorage.getItem("userID")

try{

const res=await fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"order",
userID,
service,
qty,
price,
total,
link
})
})

const data=await res.json()

if(data.status=="low_balance"){

showPopup("error","Insufficient balance")

btn.disabled=false
btn.innerHTML="Submit Order"

return

}

showPopup("success","Order placed successfully")

setTimeout(()=>{
location.href="history.html"
},2000)

}catch{

showPopup("error","Server error")

btn.disabled=false
btn.innerHTML="Submit Order"

}

}

document.getElementById("category").onchange=loadService
document.getElementById("service").onchange=calc

loadServices()

</script>

</body>
</html>
